name: pages

on:
  push:
    branches: [master, main]
    paths:
      - "packages/web/**"
      - "packages/catalog/**"
      - "packages/tryon-js/**"
      - "scripts/build-pages.mjs"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build tryon-js (IIFE + minify)
        working-directory: packages/tryon-js
        run: |
          npm test
          npm run build

      - name: Build static Pages site (minified)
        run: node scripts/build-pages.mjs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
